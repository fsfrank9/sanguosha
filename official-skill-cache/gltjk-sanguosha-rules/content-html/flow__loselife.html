                        <h2 id="-">失去体力事件的结算流程</h2>
<p>失去体力结算中有：失去体力时，失去体力后两个时机。</p>
<p>（1）失去体力时：能发动的技能：【黄巾天兵符②】。</p>
<p>发动技能后若防止失去体力，失去体力结算直接结束。</p>
<p>如果没有防止失去体力，进行扣减体力结算。</p>
<p>（2）失去体力后：能发动的技能：【诈降】。</p>
<p>至此失去体力结算完毕。</p>
