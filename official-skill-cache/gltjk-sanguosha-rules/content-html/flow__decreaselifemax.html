                        <h2 id="-">减体力上限事件的结算流程</h2>
<p>减体力上限结算中有：减体力上限前，减体力上限后两个时机。</p>
<p>（1）减体力上限前：暂时没有作用。</p>
<p>然后角色减体力上限。若该角色在减体力上限前的体力值等于其在减体力上限前的体力上限，则其减体力上限的同时须将其体力值调整至等同于其减体力上限后的体力上限。</p>
<p>（2）减体力上限后：</p>
<p>a.若该角色的体力上限大于0，能发动的技能：【伤逝】、【威重】。</p>
<p>b.若该角色的体力上限为0，其死亡。</p>
<p>至此减体力上限结算完毕。</p>
