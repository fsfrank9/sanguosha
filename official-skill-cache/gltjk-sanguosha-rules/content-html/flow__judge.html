                        <h2 id="-">判定事件的结算流程</h2>
<p>判定结算中有：判定时、判定牌生效前、判定牌生效后三个时机。</p>
<p>（1）判定时：确定判定牌。</p>
<p>能执行的技能效果：【咒缚】将“咒”作为判定牌的效果。</p>
<p>（2）判定牌生效前：判定牌等待生效。</p>
<p>能发动的技能：【鬼才】、【贞烈（旧将）】、【缓释】、【鬼道】、【极略（鬼才）】。</p>
<p>（3）判定牌生效后：确定此次判定的结果。</p>
<p>能发动的技能：【天妒】、【洛神】获得判定牌的效果、【颂威】、【屯田】将判定牌置于武将牌上的效果、【双雄】获得判定牌的效果。</p>
<p>至此判定结算完毕，在判定结算结束后将判定牌置入弃牌堆。</p>
