name: Deploy to GitHub Pages

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify v5 structural integrity
        run: node tools/build.mjs --check

      - name: Run test suite
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 审计二轮: 此前 path:. 把整个仓库 (tests/ docs/ official-skill-cache/
      # 等约 2.5MB 非运行时内容) 发布到公网站点。游戏运行只需要 index.html
      # 与 src/, 组装最小产物再上传。
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/src

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
