name: CI

# 审计 T2: pages.yml 只在 push 到 main 时跑测试 (合并后), PR 本身不被测试。
# 本 workflow 在 PR 上运行 build:check + 全量测试, 成为合并前的门禁。
# 审计二轮: 移除 push (branches-ignore main) 触发 — 此前同一 commit 在
# pull_request + push 下双跑两遍, 浪费且无增益。
'on':
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify (build:check + 全量测试)
        run: npm run verify
